name: Sync TrainingPeaks Data

on:
  schedule:
    - cron: '0 7 * * *'   # 10:00 Israel time
    - cron: '0 19 * * *'  # 22:00 Israel time
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync workout data from TrainingPeaks
        env:
          TP_AUTH_COOKIE: ${{ secrets.TP_AUTH_COOKIE }}
          TP_ATHLETE_ID: ${{ secrets.TP_ATHLETE_ID }}
        run: python3 scripts/sync-tp.py

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet public/data/aviel/2026.csv public/data/aviel/2026-extra.json; then
            echo "No changes detected"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/aviel/2026.csv public/data/aviel/2026-extra.json
          git commit -m "Auto-sync TrainingPeaks data"
          git pull --rebase origin main
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        run: |
          npm ci
          npm run deploy
