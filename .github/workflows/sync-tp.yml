name: Sync TrainingPeaks Data

on:
  schedule:
    - cron: '0 7 * * *'   # Daily at 07:00 UTC (10:00 Israel)
    - cron: '0 19 * * *'  # Daily at 19:00 UTC (22:00 Israel)
  workflow_dispatch:       # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync workout data from TrainingPeaks
        env:
          TP_AUTH_COOKIE: ${{ secrets.TP_AUTH_COOKIE }}
          TP_ATHLETE_ID: ${{ secrets.TP_ATHLETE_ID }}
        run: python3 scripts/sync-tp.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/data/aviel/2026.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/aviel/2026.csv
          git commit -m "Auto-sync TrainingPeaks data"
          git push

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        run: |
          npm ci
          npm run deploy
