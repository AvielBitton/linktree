name: Sync Strava Activities

on:
  schedule:
    - cron: '30 7 * * *'   # 10:30 Israel time (30 min after TP sync)
    - cron: '30 19 * * *'  # 22:30 Israel time (30 min after TP sync)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync activities from Strava
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python3 scripts/sync-strava-activities.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet public/data/aviel/strava-activities.json 2>/dev/null; then
            echo "No changes detected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/aviel/strava-activities.json
          git commit -m "Auto-sync Strava activities"
          git pull --rebase origin main
          git push
